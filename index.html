<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>~/blog &mdash; Notes on ML &amp; Deep Learning</title>
  <meta name="description" content="A personal blog with deep dives into machine learning and deep learning architectures." />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="~/blog — Notes on ML & Deep Learning" />
  <meta property="og:description" content="Long-form technical write-ups on machine learning and deep learning." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Inline SVG favicon: a terminal prompt -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d1117'/%3E%3Ctext x='14' y='66' font-family='monospace' font-size='52' fill='%2358a6ff'%3E%26gt;_%3C/text%3E%3C/svg%3E" />

  <style>
    :root {
      --bg: #0a0e14;
      --bg-soft: #0f1620;
      --card: #121a26;
      --card-hover: #16202e;
      --border: #1f2a3a;
      --border-glow: #2a3b52;
      --text: #e6edf3;
      --text-dim: #8b97a7;
      --text-faint: #5c6878;
      --accent: #58a6ff;
      --accent-2: #7ee787;
      --accent-3: #d2a8ff;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Animated grid + glow backdrop */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(900px circle at 15% -10%, rgba(88,166,255,0.12), transparent 45%),
        radial-gradient(800px circle at 90% 10%, rgba(210,168,255,0.10), transparent 45%),
        radial-gradient(700px circle at 50% 110%, rgba(126,231,135,0.08), transparent 45%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(88,166,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, #000 40%, transparent 100%);
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---------- Header ---------- */
    header {
      padding: 72px 0 28px;
    }

    .terminal-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot.r { background: #ff5f56; } .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }

    h1.site-title {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    h1.site-title .prompt { color: var(--accent); font-family: var(--mono); }
    h1.site-title .grad {
      background: linear-gradient(120deg, var(--accent), var(--accent-3) 55%, var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .cursor {
      display: inline-block;
      width: 0.6ch;
      background: var(--accent-2);
      animation: blink 1.1s steps(1) infinite;
      margin-left: 2px;
      transform: translateY(2px);
    }
    @keyframes blink { 50% { opacity: 0; } }

    .tagline {
      margin-top: 18px;
      max-width: 620px;
      color: var(--text-dim);
      font-size: 1.05rem;
    }

    .meta-row {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-faint);
    }
    .meta-row a { color: var(--text-dim); text-decoration: none; transition: color .15s; }
    .meta-row a:hover { color: var(--accent); }

    /* ---------- Controls ---------- */
    .controls {
      margin: 44px 0 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }
    .search {
      position: relative;
      flex: 1 1 280px;
    }
    .search input {
      width: 100%;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 38px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search input::placeholder { color: var(--text-faint); }
    .search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    .search svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: var(--text-faint);
    }

    .tags-filter { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all .15s;
    }
    .tag-btn:hover { border-color: var(--border-glow); color: var(--text); }
    .tag-btn.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 700;
    }

    /* ---------- Post grid ---------- */
    .count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding-bottom: 60px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .18s ease, border-color .18s, background .18s;
      animation: rise .5s ease both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--border-glow);
      background: var(--card-hover);
    }
    /* top accent line */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-3), var(--accent-2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s ease;
    }
    .card:hover::before { transform: scaleX(1); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .card-index {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
    }
    .card-arrow {
      width: 30px; height: 30px;
      display: grid; place-items: center;
      border-radius: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .card-arrow svg { width: 15px; height: 15px; stroke: var(--text-dim); transition: transform .2s; }
    .card:hover .card-arrow { background: var(--accent); border-color: var(--accent); }
    .card:hover .card-arrow svg { stroke: var(--bg); transform: translate(2px,-2px); }

    .card h2 {
      font-size: 1.28rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    .card p {
      color: var(--text-dim);
      font-size: 0.95rem;
      flex: 1;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 18px;
    }
    .chip {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(88,166,255,0.10);
      border: 1px solid rgba(88,166,255,0.20);
      padding: 3px 9px;
      border-radius: 6px;
    }
    .card-foot {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
      font-family: var(--mono);
    }

    /* ---------- Footer ---------- */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0 48px;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
    }
    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 560px) {
      header { padding-top: 48px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="terminal-badge">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span>blog &mdash; main</span>
      </span>
      <h1 class="site-title">
        <span class="prompt">&gt;</span> <span class="grad">The Developer Diaries</span><span class="cursor">&nbsp;</span>
      </h1>
      <p class="tagline">
        Long-form, no-fluff write-ups on what developers of today are in need.
      </p>
      <div class="meta-row">
        <span>$ cat ./about.txt</span>
        <span>posts: <strong id="post-total">0</strong></span>
        <a id="repo-link" href="#" target="_blank" rel="noopener">[ source on GitHub ]</a>
      </div>
    </header>

    <div class="controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="grep posts... (title, tag, summary)" autocomplete="off" />
      </div>
      <div class="tags-filter" id="tags-filter"></div>
    </div>

    <div class="count" id="count"></div>
    <main class="grid" id="grid"></main>

    <footer>
      <span>© <span id="year"></span> &mdash; built with plain HTML, hosted on GitHub Pages</span>
      <span>handcrafted &lt;/&gt; &middot; no trackers</span>
    </footer>
  </div>

  <script>
    /* =========================================================================
       ADD A NEW BLOG POST HERE
       -------------------------------------------------------------------------
       Just copy one { ... } block and edit it. Newest posts go at the TOP.
       Required fields: title, file, summary, tags, date, readTime
       ========================================================================= */
    const posts = [
      {
        title: "The Evolution of Deep Learning Architectures Since the Transformer",
        file: "deep-learning.html",
        summary: "A deep dive into how the Transformer reshaped the field — attention, scaling laws, the branching family tree of modern models, and where things are heading.",
        tags: ["Deep Learning", "Transformers", "Architectures"],
        date: "2026-06-28",
        readTime: "90 min read"
      },
      {
        title: "Machine Learning: A Comprehensive Survey of Its Branches",
        file: "machine-learning.html",
        summary: "From the formal learning problem to a full taxonomy of ML — supervised, unsupervised, reinforcement learning and beyond, explained from the ground up.",
        tags: ["Machine Learning", "Fundamentals", "Survey"],
        date: "2026-06-28",
        readTime: "45 min read"
      }
      // ,{
      //   title: "My Next Post Title",
      //   file: "my-next-post.html",
      //   summary: "One or two sentences describing the post.",
      //   tags: ["Tag One", "Tag Two"],
      //   date: "2026-07-15",
      //   readTime: "10 min read"
      // }
    ];

    /* ---- Optional: auto-fill the GitHub repo link from the Pages URL ---- */
    (function setRepoLink() {
      const link = document.getElementById('repo-link');
      const host = location.hostname; // e.g. username.github.io
      const m = host.match(/^([^.]+)\.github\.io$/);
      if (m) {
        const user = m[1];
        const parts = location.pathname.split('/').filter(Boolean);
        const repo = parts.length ? parts[0] : `${user}.github.io`;
        link.href = `https://github.com/${user}/${repo}`;
      } else {
        link.href = "https://github.com";
      }
    })();

    /* ---- Render logic (no need to edit below to add posts) ---- */
    const grid = document.getElementById('grid');
    const countEl = document.getElementById('count');
    const searchEl = document.getElementById('search');
    const tagsFilterEl = document.getElementById('tags-filter');
    document.getElementById('year').textContent = new Date().getFullYear();
    document.getElementById('post-total').textContent = posts.length;

    let activeTag = "all";
    let query = "";

    const fmtDate = (iso) => {
      const d = new Date(iso + "T00:00:00");
      if (isNaN(d)) return iso;
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    };

    function buildTagFilters() {
      const allTags = ["all", ...new Set(posts.flatMap(p => p.tags))];
      tagsFilterEl.innerHTML = allTags.map(t =>
        `<button class="tag-btn${t === 'all' ? ' active' : ''}" data-tag="${t}">${t === 'all' ? '# all' : t}</button>`
      ).join('');
      tagsFilterEl.querySelectorAll('.tag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTag = btn.dataset.tag;
          tagsFilterEl.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        });
      });
    }

    function render() {
      const q = query.trim().toLowerCase();
      const filtered = posts.filter(p => {
        const tagOk = activeTag === "all" || p.tags.includes(activeTag);
        const text = (p.title + " " + p.summary + " " + p.tags.join(" ")).toLowerCase();
        const searchOk = !q || text.includes(q);
        return tagOk && searchOk;
      });

      countEl.textContent = `// showing ${filtered.length} of ${posts.length} post${posts.length === 1 ? '' : 's'}`;

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty">no posts match your filter &mdash; try clearing the search</div>`;
        return;
      }

      grid.innerHTML = filtered.map((p, i) => `
        <a class="card" href="${p.file}" style="animation-delay:${i * 60}ms">
          <div class="card-top">
            <span class="card-index">${String(i + 1).padStart(2, '0')}</span>
            <span class="card-arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
            </span>
          </div>
          <h2>${p.title}</h2>
          <p>${p.summary}</p>
          <div class="card-tags">${p.tags.map(t => `<span class="chip">${t}</span>`).join('')}</div>
          <div class="card-foot">
            <span>${fmtDate(p.date)}</span>
            <span>${p.readTime}</span>
          </div>
        </a>
      `).join('');
    }

    searchEl.addEventListener('input', (e) => { query = e.target.value; render(); });

    buildTagFilters();
    render();
  </script>
</body>
</html>
